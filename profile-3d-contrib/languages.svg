<svg width="600" height="1090" viewBox="0 0 600 1090" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 18px;
      font-weight: bold;
      fill: #ff79c6;
    }
    .subtitle {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 10px;
      fill: #6272a4;
      letter-spacing: 2px;
    }
    .bg {
      fill: #1a1b26;
      stroke: #3d59a1;
      stroke-width: 2;
      rx: 12px;
    }
  </style>
  
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
