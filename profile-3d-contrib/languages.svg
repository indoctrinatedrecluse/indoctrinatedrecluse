      <text x="540" y="12" fill="#f87171" font-family="'Fira Code', 'Courier New', monospace" font-size="14" font-weight="bold" text-anchor="end">22.8%</text>
      <rect x="0" y="22" width="540" height="8" fill="#1e1e2e" rx="4" />
      <rect x="0" y="22" width="102" height="8" fill="url(#grad_HTML)" rx="4" filter="url(#glow)" />
    </g>
    <!-- Row 1: Java -->
