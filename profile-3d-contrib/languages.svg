<svg width="600" height="820" viewBox="0 0 600 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 18px;
      font-weight: bold;
      fill: #ff79c6;
    }
    .subtitle {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 10px;
      fill: #6272a4;
      letter-spacing: 2px;
    }
    .bg {
      fill: #1a1b26;
      stroke: #3d59a1;
      stroke-width: 2;
      rx: 12px;
    }
  </style>
  
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <linearGradient id="grad_HTML" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f87171" />
      <stop offset="100%" stop-color="#dc2626" />
    </linearGradient>
    <linearGradient id="grad_Java" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="hsl(256, 95%, 65%)" />
      <stop offset="100%" stop-color="hsl(256, 95%, 45%)" />
    </linearGradient>
    <linearGradient id="grad_Rust" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fb923c" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <linearGradient id="grad_PHP" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="hsl(145, 95%, 65%)" />
      <stop offset="100%" stop-color="hsl(145, 95%, 45%)" />
    </linearGradient>
    <linearGradient id="grad_Python" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
