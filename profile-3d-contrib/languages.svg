      <text x="0" y="12" fill="#e2e8f0" font-family="'Fira Code', 'Courier New', monospace" font-size="14" font-weight="bold">Java</text>
      <text x="540" y="12" fill="hsl(256, 95%, 65%)" font-family="'Fira Code', 'Courier New', monospace" font-size="14" font-weight="bold" text-anchor="end">20.7%</text>
